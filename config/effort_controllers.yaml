# Configuracion del controller_manager para simulacion con torque/esfuerzo.
# Cargado por el plugin gazebo_ros2_control embebido en el URDF.

controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_effort_controller:
      type: effort_controllers/JointGroupEffortController

    gripper_controller:
      type: position_controllers/GripperActionController

# El orden de joints define el orden del vector Float64MultiArray en
# /arm_effort_controller/commands: [joint1, joint2, joint3, joint4]
arm_effort_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
    interface_name: effort

gripper_controller:
  ros__parameters:
    joint: gripper_left_joint
    interface_name: position
    state_interfaces:
      - position
      - velocity
      - effort
    action_monitor_rate: 20.0
    allow_stalling: false
