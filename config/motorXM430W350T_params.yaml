/**:
  ros__parameters:

    # ════════════════════════════════════════════════════════════════════════
    #  Modelo torque→corriente Dynamixel XM430-W350-T (OpenMANIPULATOR-X)
    #  ENSAMBLADO por assemble_motor_params.py — 2026-07-19
    #
    #  Modelo (por articulación):
    #    I[i] = alpha[i]·tau[i] + Fv[i]·dq[i] + Fc[i]·tanh(dq[i]/eps) + I_offset[i]
    #
    #  Cada parámetro proviene del método MÁS ADECUADO para identificarlo:
    #   · alpha, I_offset → modo CORRIENTE dinámico (identify_alpha.py, log 30).
    #                       kt_efectivo ≈ 1.80 N·m/A (ideal datasheet 1.78).
    #   · Fv, Fc          → barrido de VELOCIDAD CONSTANTE + reversión
    #                       emparejada por posición (identify_friction.py,
    #                       logs J1..J4: log 21, log 22, log 23, log 24).
    #
    #  Protocolo: src/Identification/Ident_OpenManX_XM430W350T_procedure.md
    #
    #  Unidades:
    #    motor_alpha            [ticks/N·m]
    #    motor_Fv               [ticks/(rad/s)]
    #    motor_Fc               [ticks]
    #    motor_I_offset         [ticks]
    #    motor_epsilon_friction [rad/s]
    # ════════════════════════════════════════════════════════════════════════
    #                              J1        J2        J3        J4
    motor_alpha:             [ 207.022,  206.571,  207.473,  207.022]   # modo corriente
    motor_Fv:                [   4.161,    1.832,    0.000,    0.663]   # barrido velocidad
    motor_Fc:                [   7.663,   17.533,   27.462,    9.368]   # barrido velocidad
    motor_I_offset:          [   0.042,    0.058,    0.136,    0.434]   # modo corriente
    # Suavizado del tanh de Coulomb. Los nodos hw (hw_fl, hw_io, hw_tvlqr)
    # alimentan el tanh con la velocidad DESEADA (sin ruido): eps pequeno es
    # seguro y acorta la zona muerta en las inversiones de direccion
    # (micro-plateaus). Si un nodo usa la velocidad MEDIDA aqui, subir hacia
    # 0.30 (con dq medida el tanh conmutaria con el ruido cerca de velocidad
    # cero).
    # Solo afecta la COMPENSACION, no los valores identificados de Fc/Fv.
    motor_epsilon_friction:    0.0500

    # ── Configuración de hardware (señales, encoder, límites) ────────────────
    # joint_zero_tick  : posición cero del encoder [ticks] por joint
    # encoder_sign     : dirección positiva del encoder (+1 o -1)
    # current_sign     : polaridad de la corriente respecto al encoder (+1 o -1)
    # joint_lower/upper: límites articulares [rad]
    # current_limit_register : registro Current Limit de Dynamixel (addr 38)
    # current_cmd_limit      : corriente comandada máxima por joint [ticks]
    # current_measured_peak  : umbral de parada de emergencia [ticks]
    # NOTA: tau_max NO se define aquí; cada nodo lo fija internamente (1.2 N·m).
    joint_zero_tick:          [2048, 2048, 2048, 2048]
    encoder_sign:             [ 1.0,  1.0,  1.0,  1.0]
    current_sign:             [ 1.0,  1.0,  1.0,  1.0]
    joint_lower:              [-2.356194, -1.919862, -1.919862, -1.800000]
    joint_upper:              [ 2.356194,  1.745329,  1.570796,  2.100000]
    current_limit_register:   350
    current_cmd_limit:        [257, 257, 257, 257]
    current_measured_peak:    313
