# ─── Configuracion de posicion inicial del robot en simulacion Gazebo ────────
#
# use_fixed_init: false → el robot inicia en equilibrio bajo gravedad sin torques
#                          (comportamiento por defecto)
#                 true  → el robot inicia en la posicion articular q_init
#
# q_init [rad]: [q1, q2, q3, q4]
#   Solo se aplica si use_fixed_init: true.
#   El controlador de esfuerzo debe compensar la gravedad en esa posicion.
#
# ─── Configuraciones de referencia ───────────────────────────────────────────
#   Equilibrio gravedad : use_fixed_init: false   (q_init ignorado)
#   x0 Lab 5 Act. 1    : use_fixed_init: true    q_init: [1.5708, 0.0, 0.5236, 1.0472]
#   Home (todos cero)  : use_fixed_init: true    q_init: [0.0, 0.0, 0.0, 0.0]

use_fixed_init: true
#q_init: [0.0, 0.0, 0.0, 0.0]           # x0 = [0, 0, 0, 0]
#q_init: [1.5708, 0.0, 0.5236, 1.0472]   # x0 = [pi/2, 0, pi/6, pi/3]
q_init: [0.0, -0.5, 0.3, 0.785]         # Lab6 Act1 SMC articular: q_d(0) = [0,-0.5,0.3,pi/4]
#q_init: [0.0, -0.785, 0.0, 0.0]          # Lab6 Act2 SMC cart: eq. gravedad→[0,-1.3,1.4,0.69]→phi≈+0.78
#q_init: [0.0, -0.50, 0.25, 0.85]

# ─── Obstáculo MDF ───────────────────────────────────────────────────────────
#
# spawn_obstacle: true  → spawnea el obstáculo tipo arco/mesa de MDF en Gazebo
#                false  → sin obstáculo (comportamiento por defecto)
#
# obstacle_pose: [x, y, z, roll, pitch, yaw]  (metros / radianes, marco world)
#   El STL está en mm → scale 0.001 aplicada internamente.
#   Origen del STL: centrado en X/Y, fondo de la pieza en Z=0.
#   Con z=0 la pieza apoya directamente en el suelo de Gazebo.
#   Punto de partida: obstáculo a 0.16 m en +X, frente al espacio de trabajo.

spawn_obstacle: false
obstacle_pose: [0.1125, 0.0, 0.0, 0.0, 0.0, 1.5708]

# ─── Escalas de dinamica ─────────────────────────────────────────────────────
#
# mass_inertia_scale : factor multiplicativo aplicado a masas e inercias de
#                      link1..link5 (gripper links no se ven afectados).
#                      1.0 = valores nominales calibrados.
#                      >1  = robot mas pesado/lento  |  <1 = mas ligero.
#
# damping_scale      : factor multiplicativo aplicado al parametro damping
#                      de joint1..joint4 (friction permanece fijo).
#                      1.0 = damping nominal identificado.
#                      0.0 = sin damping  |  >1 = mayor amortiguamiento.
#
# Rango tipico de uso:
#   Sin amortiguamiento viscoso : damping_scale: 0.0
#   Modelo nominal              : mass_inertia_scale: 1.0  damping_scale: 1.0
#   Perturbacion de masa        : mass_inertia_scale: 1.5

mass_inertia_scale: 1.0
damping_scale: 1.0
