hw_identify_node:
  ros__parameters:

    # ── Modo de operación ────────────────────────────────────────────────────
    # dry_run | read_only | zero_current | smooth_excitation | friction_test
    mode: "dry_run"

    # ── Seguridad (todos off por defecto) ────────────────────────────────────
    open_port: false                 # true: abre /dev/ttyUSB0
    enable_torque: false             # true: activa torque en Current Mode
    enable_current_commands: false   # true: envía Goal Current al motor
    current_scale: 0.0              # [0..1] escala adicional sobre tau_cmd
    trajectory_scale: 0.0           # [0..1] escala de amplitudes de la trayectoria

    # ── Hardware ─────────────────────────────────────────────────────────────
    port_name: "/dev/ttyUSB0"
    log_id: 1                      # sufijo del archivo CSV
    duration_s: 30.0                # duración total [s] (0 = sin límite)
    t_ramp: 3.0                     # duración de la rampa quintica inicial [s]

    # ── Trayectoria sinusoidal biarmónica (4 joints) ─────────────────────────
    # q_i(t') = q0_i + traj_scale*(A1_i*sin(w1_i*t') + A2_i*sin(w2_i*t'))
    # t' = t - t_ramp
    q0: [0.0, 0.0, 0.0,  0.0]          # [rad] J4=0 (muñeca recta, tau_g4≈0 → compensación segura)
    A1: [0.30, 0.20, 0.25, 0.20]     # [rad] amplitud 1er armónico (J2 reducido)
    w1: [0.60, 1.00, 0.80, 0.80]     # [rad/s] frecuencia 1er armónico
    A2: [0.15, 0.08, 0.12, 0.08]     # [rad] amplitud 2do armónico (J2 reducido)
    w2: [1.50, 2.00, 1.80, 1.50]     # [rad/s] frecuencia 2do armónico

    # ── Filtro diferenciador de ddq ──────────────────────────────────────────
    # alpha = exp(-2*pi*f_cut*0.01); rango típico: 3..10 Hz
    f_cut_hz: 5.0

    # ── Compensación en torque_to_current ────────────────────────────────────
    # Iniciar en 0; ajustar solo después de analizar datos de identificación
    deadzone_ticks: 0.0             # compensación zona muerta [ticks]
    viscous_comp: 0.0               # compensación viscosa [ticks/(rad·s)]

    # ── Modo friction_test ───────────────────────────────────────────────────
    friction_joint: 1               # joint a excitar (1..4)
    friction_w: 0.1                 # [rad/s] muy lento para ver Coulomb
    friction_A: 0.3                 # [rad] amplitud de la excitación
    friction_kp: 3.0                # [N·m/rad] ganancia P suave de seguimiento

    # ── Corrección PD (smooth_excitation) ────────────────────────────────────
    # tau_cmd = current_scale*tau_ref + kp_pd*(q_ref-q) + kd_pd*(dq_ref-dq)
    # Mantiene el robot cerca de la trayectoria cuando el modelo Pinocchio
    # tiene error. Empezar con kp_pd=2.0, kd_pd=0.1 para experimento real.
    kp_pd: 0.0                      # [N·m/rad]   ganancia proporcional posición
    kd_pd: 0.0                      # [N·m·s/rad] ganancia derivativa velocidad
